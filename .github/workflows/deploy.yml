name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Inject Supabase Credentials
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          node -e "
            const fs = require('fs');
            let content = fs.readFileSync('app.js', 'utf8');
            content = content.replace('__SUPABASE_URL__', process.env.SUPABASE_URL);
            content = content.replace('__SUPABASE_KEY__', process.env.SUPABASE_KEY);
            fs.writeFileSync('app.js', content);
            console.log('Credentials injected successfully');
            console.log('SUPABASE_URL:', process.env.SUPABASE_URL ? 'Set ✓' : 'Missing ✗');
            console.log('SUPABASE_KEY:', process.env.SUPABASE_KEY ? 'Set ✓' : 'Missing ✗');
          "

      - name: Verify injection
        run: |
          head -10 app.js

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - uses: actions/deploy-pages@v4